{% extends "base.html" %}

{% block content %}
<section class="panel add-page">
    <div class="panel-heading">
        <div>
            <p class="section-tag">Registro</p>
            <h2>Agregar un nuevo libro</h2>
        </div>
        <a class="button button-ghost" href="{{ url_for('library.home') }}">Volver al dashboard</a>
    </div>

    <form class="book-form standalone" method="post" action="{{ url_for('library.add_book') }}">
        <div class="form-grid">
            <label>
                <span>Title</span>
                <input type="text" name="title" placeholder="Título del libro" required>
            </label>
            <label>
                <span>Author</span>
                <input type="text" name="author" placeholder="Autor" required>
            </label>
            <label>
                <span>Genre</span>
                <input type="text" name="genre" placeholder="Género" required>
            </label>
            <label>
                <span>Year</span>
                <input type="number" name="year" min="1" placeholder="Año" required>
            </label>
            <label>
                <span>Status</span>
                <select name="reading_status" required>
                    <option value="Pending">Pending</option>
                    <option value="Reading">Reading</option>
                    <option value="Finished">Finished</option>
                </select>
            </label>
            <label>
                <span>Progress</span>
                <input type="number" name="progress" min="0" max="100" placeholder="0 - 100" required>
            </label>
        </div>
        <div class="button-row">
            <button class="button button-primary" type="submit" name="placement" value="end">Add (end)</button>
            <button class="button button-secondary" type="submit" name="placement" value="start">Add (start)</button>
        </div>
    </form>
</section>
{% endblock %}
